<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheyenne Algorithms LLC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 2.5em;
            color: #00aaff;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1em;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .status {
            font-size: 1.1em;
            color: #00ffaa;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .divider {
            border: none;
            border-top: 1px solid #222;
            margin: 30px auto;
            width: 300px;
        }

        .contact {
            font-size: 0.85em;
            color: #555;
        }

        .contact a {
            color: #00aaff;
            text-decoration: none;
        }

        .contact a:hover {
            color: #00ffaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cheyenne Algorithms</h1>
        <p class="tagline">LLC &nbsp;|&nbsp; Colorado Springs, CO</p>
        <hr class="divider">
        <p class="status">[ SITE UNDER CONSTRUCTION ]</p>
        <p>Something interesting is being built here.</p>
        <hr class="divider">
        <p class="contact">Contact: <a href="mailto:amandagiarla@gmail.com">amandagiarla@gmail.com</a></p>
    </div>
</body>
</html>
